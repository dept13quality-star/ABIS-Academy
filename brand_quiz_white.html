<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABIS GROUP — Бренды по странам</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --purple-deep: #2D0A5C;
    --purple-main: #4A1580;
    --purple-mid: #5C1F8F;
    --green: #2E7D32;
    --green-mid: #388E3C;
    --green-light: #43A047;
    --green-pale: #E8F5E9;
    --green-accent: #66BB6A;
    --gold: #C8961E;
    --bg: #F8F9FA;
    --surface: #FFFFFF;
    --border: #E0E0E0;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --success: #2E7D32;
    --error: #C62828;
    --chip-bg: #F3EEF9;
    --chip-border: #C4A8E8;
    --chip-text: #3D0F72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    padding: 20px;
  }

  .container { max-width: 1100px; margin: 0 auto; }

  /* HEADER */
  header {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px 28px;
    margin-bottom: 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    display: flex;
    align-items: center;
    gap: 20px;
    border-left: 5px solid var(--green);
  }

  .logo-block { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--purple-main), var(--purple-deep));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 23px; font-weight: 700;
    color: var(--purple-deep);
    letter-spacing: 1px;
  }

  .logo-text span { color: var(--green); }

  .header-right { margin-left: auto; text-align: right; }

  .task-label {
    font-size: 10px; font-weight: 800;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--green);
    margin-bottom: 3px;
  }

  .task-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; color: var(--text);
  }

  /* INSTRUCTION */
  .instruction {
    background: var(--green-pale);
    border: 1.5px solid #A5D6A7;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    color: var(--green);
    text-align: center;
    margin-bottom: 18px;
    font-weight: 700;
  }

  /* PROGRESS */
  .progress-wrap {
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    margin-bottom: 18px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-accent));
    border-radius: 6px;
    width: 0%;
    transition: width 0.4s ease;
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 10px; font-weight: 800;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* CHIPS POOL */
  .pool-section { margin-bottom: 20px; }

  .chips-pool {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 16px;
    min-height: 76px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-content: flex-start;
    transition: border-color 0.2s, background 0.2s;
  }

  .chips-pool.drag-over {
    border-color: var(--green-accent);
    background: var(--green-pale);
  }

  /* CHIP */
  .chip {
    background: var(--chip-bg);
    border: 1.5px solid var(--chip-border);
    border-radius: 30px;
    padding: 7px 15px;
    font-size: 12px;
    font-weight: 800;
    color: var(--chip-text);
    cursor: grab;
    user-select: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover {
    background: #E8DFFA;
    border-color: var(--purple-mid);
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(74,21,128,0.15);
  }

  .chip:active { cursor: grabbing; }
  .chip.dragging { opacity: 0.3; }

  .chip.correct {
    background: #E8F5E9;
    border-color: var(--green);
    color: var(--green);
    cursor: default;
  }

  .chip.wrong {
    background: #FFEBEE;
    border-color: var(--error);
    color: var(--error);
    cursor: default;
    animation: shake 0.3s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* COUNTRIES GRID */
  .countries-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 22px;
  }

  .country-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .country-card.drag-over {
    border-color: var(--green-accent);
    box-shadow: 0 0 0 3px rgba(102,187,106,0.25);
  }

  .country-header {
    background: linear-gradient(90deg, var(--purple-deep), var(--purple-mid));
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .green-stripe {
    width: 4px; height: 26px;
    background: var(--green-accent);
    border-radius: 4px;
    flex-shrink: 0;
  }

  .country-flag { font-size: 20px; }

  .country-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }

  .country-count {
    margin-left: auto;
    background: rgba(255,255,255,0.13);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 800;
    color: var(--green-accent);
  }

  .drop-zone {
    min-height: 72px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
  }

  .drop-zone:empty::after {
    content: 'Перетащите бренды сюда';
    color: #C4C4C4;
    font-size: 12px;
    font-style: italic;
    font-weight: 600;
    width: 100%;
    text-align: center;
    padding: 14px 0;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  button {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-check {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 14px rgba(46,125,50,0.3);
  }
  .btn-check:hover { background: var(--green-light); transform: translateY(-2px); }

  .btn-reset {
    background: transparent;
    color: var(--text-muted);
    border: 2px solid var(--border);
  }
  .btn-reset:hover { border-color: var(--purple-main); color: var(--purple-main); transform: translateY(-2px); }

  /* SCORE */
  .score-bar {
    display: none;
    background: var(--surface);
    border: 2px solid var(--green);
    border-radius: 14px;
    padding: 16px 28px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--text);
    box-shadow: 0 2px 12px rgba(46,125,50,0.1);
  }
  .score-bar.show { display: block; }
  .score-bar .score-num {
    color: var(--green);
    font-size: 26px;
    font-family: 'Playfair Display', serif;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <div class="logo-icon">A</div>
      <div class="logo-text">ABIS <span>GROUP</span></div>
    </div>
    <div class="header-right">
      <div class="task-label">Тестовое задание</div>
      <div class="task-title">Книга по продукту · Бренды по странам</div>
    </div>
  </header>

  <div class="instruction">
    🏷️ Перетащите каждый бренд в карточку соответствующей страны-производителя
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="pool-section">
    <div class="section-label">Бренды для распределения</div>
    <div class="chips-pool" id="pool"
      ondragover="onDragOver(event)"
      ondrop="onDrop(event,'pool')"
      ondragleave="onDragLeave(event)">
    </div>
  </div>

  <div class="section-label" style="margin-bottom:14px;">Страны</div>
  <div class="countries-grid" id="countriesGrid"></div>

  <div class="score-bar" id="scoreBar"></div>

  <div class="controls">
    <button class="btn-check" onclick="checkAnswers()">✓ Проверить ответы</button>
    <button class="btn-reset" onclick="resetAll()">↺ Начать заново</button>
  </div>

</div>

<script>
const BRANDS = [
  { name: "FREYA",              country: "Германия" },
  { name: "VOLTEGA",            country: "Германия" },
  { name: "FAVOURITE",          country: "Германия" },
  { name: "F-PROMO",            country: "Германия" },
  { name: "CHIARO",             country: "Германия" },
  { name: "MW-LIGHT",           country: "Германия" },
  { name: "WERTMARK",           country: "Германия" },
  { name: "VOLTUM",             country: "Германия" },
  { name: "SCHNEIDER ELECTRIC", country: "Германия" },
  { name: "GIRA",               country: "Германия" },
  { name: "JUNG",               country: "Германия" },
  { name: "ARTE LAMP",          country: "Италия"   },
  { name: "DIVINARE",           country: "Италия"   },
  { name: "ODEON LIGHT",        country: "Италия"   },
  { name: "LUMION",             country: "Италия"   },
  { name: "SONEX",              country: "Италия"   },
  { name: "ST LUCE",            country: "Италия"   },
  { name: "ILAMP",              country: "Италия"   },
  { name: "IDEAL LUX",          country: "Италия"   },
  { name: "LUCIA TUCCI",        country: "Италия"   },
  { name: "ARTI LAMPADARI",     country: "Италия"   },
  { name: "DIO D'ARTE",         country: "Италия"   },
  { name: "LUSSOLE",            country: "Италия"   },
  { name: "RIVOLI",             country: "Италия"   },
  { name: "VITALUCE",           country: "Италия"   },
  { name: "BTICINO",            country: "Италия"   },
  { name: "NEWPORT",            country: "США"      },
  { name: "ILEDEX",             country: "Россия"   },
  { name: "SIMPLE STORY",       country: "Россия"   },
  { name: "APLOYT",             country: "Польша"   },
  { name: "LEGRAND",            country: "Франция"  },
];

const COUNTRIES = [
  { name: "Германия", flag: "🇩🇪" },
  { name: "Италия",   flag: "🇮🇹" },
  { name: "США",      flag: "🇺🇸" },
  { name: "Россия",   flag: "🇷🇺" },
  { name: "Польша",   flag: "🇵🇱" },
  { name: "Франция",  flag: "🇫🇷" },
];

let dragging = null;
let draggingFrom = null;
let checked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildGrid() {
  const grid = document.getElementById('countriesGrid');
  grid.innerHTML = '';
  COUNTRIES.forEach(c => {
    const total = BRANDS.filter(b => b.country === c.name).length;
    const card = document.createElement('div');
    card.className = 'country-card';
    card.innerHTML = `
      <div class="country-header">
        <div class="green-stripe"></div>
        <span class="country-flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <span class="country-count" id="count-${c.name}">0 / ${total}</span>
      </div>
      <div class="drop-zone" id="zone-${c.name}"
        ondragover="onDragOver(event)"
        ondrop="onDrop(event,'${c.name}')"
        ondragleave="onDragLeave(event)">
      </div>
    `;
    grid.appendChild(card);
  });
}

function buildPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  shuffle(BRANDS).forEach(b => pool.appendChild(makeChip(b.name)));
}

function makeChip(name) {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.textContent = name;
  chip.draggable = true;
  chip.dataset.brand = name;
  chip.addEventListener('dragstart', e => {
    dragging = name;
    draggingFrom = e.target.closest('.drop-zone')?.id || 'pool';
    setTimeout(() => chip.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
  return chip;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
  const card = e.currentTarget.closest('.country-card');
  if (card) card.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
  const card = e.currentTarget.closest('.country-card');
  if (card) card.classList.remove('drag-over');
}

function onDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const card = e.currentTarget.closest('.country-card');
  if (card) card.classList.remove('drag-over');
  if (!dragging || checked) return;

  const fromEl = document.getElementById(draggingFrom) || document.getElementById('pool');
  const oldChip = fromEl?.querySelector(`[data-brand="${dragging.replace(/'/g,"\\'")}"]`);
  if (oldChip) oldChip.remove();

  const targetEl = targetId === 'pool'
    ? document.getElementById('pool')
    : document.getElementById(`zone-${targetId}`);
  if (targetEl) targetEl.appendChild(makeChip(dragging));

  dragging = null;
  updateCounts();
  updateProgress();
}

function updateCounts() {
  COUNTRIES.forEach(c => {
    const zone = document.getElementById(`zone-${c.name}`);
    const placed = zone ? zone.querySelectorAll('.chip').length : 0;
    const total = BRANDS.filter(b => b.country === c.name).length;
    const el = document.getElementById(`count-${c.name}`);
    if (el) el.textContent = `${placed} / ${total}`;
  });
}

function updateProgress() {
  const inPool = document.getElementById('pool').querySelectorAll('.chip').length;
  const pct = ((BRANDS.length - inPool) / BRANDS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function checkAnswers() {
  let correct = 0;
  COUNTRIES.forEach(c => {
    document.getElementById(`zone-${c.name}`).querySelectorAll('.chip').forEach(chip => {
      const expected = BRANDS.find(b => b.name === chip.dataset.brand)?.country;
      chip.draggable = false;
      if (expected === c.name) { chip.classList.add('correct'); correct++; }
      else chip.classList.add('wrong');
    });
  });
  document.getElementById('pool').querySelectorAll('.chip').forEach(chip => {
    chip.classList.add('wrong'); chip.draggable = false;
  });
  const pct = Math.round((correct / BRANDS.length) * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 70 ? '⭐' : '📖';
  const bar = document.getElementById('scoreBar');
  bar.innerHTML = `${emoji} Результат: <span class="score-num">${correct} / ${BRANDS.length}</span> &nbsp;·&nbsp; ${pct}%`;
  bar.classList.add('show');
  checked = true;
}

function resetAll() {
  checked = false;
  document.getElementById('scoreBar').classList.remove('show');
  buildPool();
  COUNTRIES.forEach(c => { const z = document.getElementById(`zone-${c.name}`); if (z) z.innerHTML = ''; });
  updateCounts();
  document.getElementById('progressFill').style.width = '0%';
}

buildGrid();
buildPool();
updateCounts();
</script>
</body>
</html>
