<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог — ABIS Academy</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0d12;
  --surface: #17151f;
  --surface2: #1f1c2a;
  --border: #2c2840;
  --accent: #7b6cf0;
  --accent-h: #6558d8;
  --text: #ebe9f5;
  --muted: #6b6882;
  --r: 7px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOOLBAR ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 48px;
}

.sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  padding: 6px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 12.5px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.btn.icon { padding: 6px 7px; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.btn.primary:hover { background: var(--accent-h); border-color: var(--accent-h); }

#page-wrap {
  display: flex; align-items: center; gap: 6px;
  font-size: 12.5px; color: var(--muted);
}
#page-input {
  width: 44px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  padding: 5px 6px;
  font-size: 12.5px;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}
#page-input::-webkit-outer-spin-button,
#page-input::-webkit-inner-spin-button { -webkit-appearance: none; }
#page-input:focus { border-color: var(--accent); }
#page-input:disabled { opacity: 0.35; }

#zoom-val { font-size: 12px; color: var(--muted); min-width: 36px; text-align: center; }

#doc-name {
  flex: 1;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.01em;
  opacity: 0.85;
}

/* ── VIEWER ── */
#viewer {
  flex: 1;
  overflow-y: auto;
  overflow-x: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 28px 20px;
  background: var(--bg);
  position: relative;
}

#canvas-wrap {
  box-shadow: 0 4px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  border-radius: 4px;
  overflow: hidden;
  line-height: 0;
  display: none;
}

#pdf-canvas { display: block; }

/* ── STATES ── */
#loading, #no-src {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  text-align: center;
}
#loading { background: var(--bg); z-index: 10; }
#no-src { display: none; }

.spin {
  width: 34px; height: 34px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#load-txt { font-size: 13px; color: var(--muted); }

.empty-icon { opacity: 0.15; margin-bottom: 4px; }
.empty-h { font-size: 17px; font-weight: 300; color: var(--muted); }
.empty-sub { font-size: 12px; color: var(--muted); opacity: 0.6; }

/* ── STATUSBAR ── */
#status {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 14px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}
#status kbd {
  display: inline-block; padding: 1px 4px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 3px; font-size: 10px;
  font-family: inherit;
}
#status-left { display: flex; align-items: center; gap: 12px; }

/* Fullscreen tweaks */
:fullscreen #viewer { height: 100vh; }
:-webkit-full-screen #viewer { height: 100vh; }

/* ── FILE INPUT ── */
#file-input { display: none; }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Navigation -->
  <button class="btn icon" id="btn-prev" disabled title="Назад (←)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div id="page-wrap">
    <input type="number" id="page-input" value="1" min="1" disabled>
    <span id="page-total">/ —</span>
  </div>

  <button class="btn icon" id="btn-next" disabled title="Вперёд (→)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

  <div class="sep"></div>

  <!-- Zoom -->
  <button class="btn icon" id="btn-zm" disabled title="Уменьшить (-)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <span id="zoom-val">—</span>
  <button class="btn icon" id="btn-zp" disabled title="Увеличить (+)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <button class="btn icon" id="btn-fit" disabled title="По ширине (0)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>

  <div class="sep"></div>

  <!-- Title -->
  <span id="doc-name">Crystal Lux — Генеральный каталог 2025</span>

  <!-- Right actions -->
  <button class="btn" id="btn-open">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Открыть файл
  </button>
  <button class="btn primary" id="btn-fs">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    На весь экран
  </button>
</div>

<input type="file" id="file-input" accept=".pdf">

<div id="viewer">
  <div id="loading">
    <div class="spin"></div>
    <div id="load-txt">Загрузка каталога…</div>
  </div>

  <div id="no-src">
    <svg class="empty-icon" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <p class="empty-h">Каталог не выбран</p>
    <p class="empty-sub">Нажмите «Открыть файл» или укажите ?src= в URL</p>
    <br>
    <button class="btn primary" onclick="document.getElementById('file-input').click()">Открыть PDF</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<div id="status">
  <div id="status-left">
    <span id="status-txt">Готов</span>
  </div>
  <span><kbd>←</kbd> <kbd>→</kbd> листать &nbsp; <kbd>+</kbd> <kbd>−</kbd> масштаб &nbsp; <kbd>F</kbd> полный экран</span>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
let pdf = null, page = 1, scale = 1, fitScale = 1;
let rendering = false, pending = null;

// ── Elements ──
const canvas    = document.getElementById('pdf-canvas');
const ctx       = canvas.getContext('2d');
const loading   = document.getElementById('loading');
const noSrc     = document.getElementById('no-src');
const wrap      = document.getElementById('canvas-wrap');
const pageInput = document.getElementById('page-input');
const pageTotal = document.getElementById('page-total');
const zoomVal   = document.getElementById('zoom-val');
const statusTxt = document.getElementById('status-txt');
const loadTxt   = document.getElementById('load-txt');

// ── Boot: check ?src= param ──
const params = new URLSearchParams(location.search);
const srcUrl = params.get('src') || params.get('pdf') ||
  'https://dept13quality-star.github.io/ABIS-Academy/Generalnyj_katalog_CRYSTAL_LUX_2025_compressed.pdf';
openURL(srcUrl);

// ── Load PDF from URL (fetch as ArrayBuffer — обходит CORS/worker баги) ──
async function openURL(url) {
  loading.style.display = 'flex';
  noSrc.style.display   = 'none';
  wrap.style.display    = 'none';
  loadTxt.textContent   = 'Подключение…';

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const total  = +resp.headers.get('Content-Length') || 0;
    const reader = resp.body.getReader();
    const chunks = [];
    let loaded = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      if (total) loadTxt.textContent = `Загрузка ${Math.round(loaded / total * 100)}%…`;
      else loadTxt.textContent = `Загружено ${(loaded / 1024 / 1024).toFixed(1)} MB…`;
    }

    const data = new Uint8Array(loaded);
    let offset = 0;
    for (const chunk of chunks) { data.set(chunk, offset); offset += chunk.length; }

    pdf = await pdfjsLib.getDocument({ data }).promise;
    afterLoad();
  } catch(e) {
    loadTxt.textContent = 'Ошибка загрузки: ' + e.message;
    console.error(e);
  }
}

// ── Load from File ──
async function openFile(file) {
  loading.style.display = 'flex';
  noSrc.style.display   = 'none';
  wrap.style.display    = 'none';
  loadTxt.textContent   = 'Читаю файл…';
  document.getElementById('doc-name').textContent = file.name.replace(/\.pdf$/i, '');

  const data = await file.arrayBuffer();
  const task = pdfjsLib.getDocument({ data });
  task.onProgress = ({ loaded, total }) => {
    if (total) loadTxt.textContent = `Обработка ${Math.round(loaded/total*100)}%…`;
  };
  pdf = await task.promise;
  afterLoad();
}

// ── After PDF loaded ──
async function afterLoad() {
  pageTotal.textContent = `/ ${pdf.numPages}`;
  pageInput.max = pdf.numPages;
  pageInput.disabled = false;

  ['btn-prev','btn-next','btn-zp','btn-zm','btn-fit'].forEach(id =>
    document.getElementById(id).disabled = false
  );

  await recalcFit();
  scale = fitScale;

  loading.style.display = 'none';
  wrap.style.display    = 'block';
  goTo(1);
}

// ── Fit scale ──
async function recalcFit() {
  const p = await pdf.getPage(1);
  const vp = p.getViewport({ scale: 1 });
  const viewer = document.getElementById('viewer');
  const availW = viewer.clientWidth - 40;
  fitScale = Math.max(0.3, Math.min(availW / vp.width, 3));
}

// ── Render page ──
async function renderPage(n) {
  if (rendering) { pending = n; return; }
  rendering = true;

  page = n;
  pageInput.value = n;
  document.getElementById('btn-prev').disabled = (n <= 1);
  document.getElementById('btn-next').disabled = (n >= pdf.numPages);

  const p  = await pdf.getPage(n);
  const vp = p.getViewport({ scale });
  const dpr = window.devicePixelRatio || 1;

  canvas.width  = Math.round(vp.width  * dpr);
  canvas.height = Math.round(vp.height * dpr);
  canvas.style.width  = vp.width  + 'px';
  canvas.style.height = vp.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  await p.render({ canvasContext: ctx, viewport: vp }).promise;

  zoomVal.textContent = Math.round(scale * 100) + '%';
  statusTxt.textContent = `Страница ${n} из ${pdf.numPages}  ·  ${Math.round(scale*100)}%`;

  rendering = false;
  if (pending !== null && pending !== n) {
    const next = pending; pending = null; renderPage(next);
  }
}

// ── Navigation ──
function goTo(n) {
  if (!pdf) return;
  n = Math.max(1, Math.min(pdf.numPages, n));
  renderPage(n);
}
function zoom(d) {
  scale = Math.max(0.25, Math.min(4, scale + d));
  renderPage(page);
}

// ── Button bindings ──
document.getElementById('btn-prev').addEventListener('click', () => goTo(page - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(page + 1));
document.getElementById('btn-zp').addEventListener('click',   () => zoom(+0.25));
document.getElementById('btn-zm').addEventListener('click',   () => zoom(-0.25));
document.getElementById('btn-fit').addEventListener('click',  () => { scale = fitScale; renderPage(page); });

pageInput.addEventListener('change', () => goTo(+pageInput.value));
pageInput.addEventListener('keydown', e => { if (e.key === 'Enter') goTo(+pageInput.value); });

// ── File input ──
document.getElementById('btn-open').addEventListener('click', () =>
  document.getElementById('file-input').click()
);
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) openFile(f);
  e.target.value = '';
});

// ── Fullscreen ──
const btnFS = document.getElementById('btn-fs');
btnFS.addEventListener('click', () => {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
});

function onFSChange() {
  const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
  btnFS.innerHTML = isFS
    ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg> Свернуть`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg> На весь экран`;
  if (isFS && pdf) setTimeout(() => recalcFit().then(() => renderPage(page)), 120);
}
document.addEventListener('fullscreenchange', onFSChange);
document.addEventListener('webkitfullscreenchange', onFSChange);

// ── Keyboard ──
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT') return;
  if (['ArrowRight','ArrowDown','PageDown'].includes(e.key)) { e.preventDefault(); goTo(page + 1); }
  if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key))  { e.preventDefault(); goTo(page - 1); }
  if (e.key === '+' || e.key === '=') zoom(+0.25);
  if (e.key === '-' || e.key === '_') zoom(-0.25);
  if (e.key === '0') { scale = fitScale; renderPage(page); }
  if (e.key.toLowerCase() === 'f') btnFS.click();
});

// ── Resize ──
window.addEventListener('resize', () => {
  if (pdf) recalcFit().then(() => renderPage(page));
});
</script>
</body>
</html>
