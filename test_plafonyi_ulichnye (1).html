<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Плафоны и Уличные светильники — Svet.kz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f1fa; min-height: 100vh; padding: 32px 20px 60px; color: #2c2338; }
header { text-align: center; margin-bottom: 32px; }
.logo { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #5B2D8E; margin-bottom: 8px; }
h1 { font-size: 24px; font-weight: 800; color: #2c2338; margin-bottom: 6px; }
header p { font-size: 14px; color: #7a6d8a; }
.progress-wrap { max-width: 660px; margin: 0 auto 28px; }
.progress-info { display: flex; justify-content: space-between; font-size: 13px; color: #7a6d8a; margin-bottom: 8px; }
.progress-bar { height: 6px; background: #ddd8ec; border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #5B2D8E, #9b6fd4); border-radius: 10px; transition: width 0.4s ease; }
.card { background: #fff; border-radius: 20px; padding: 28px; max-width: 660px; margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(91,45,142,0.09); }
.scenario { display: flex; gap: 14px; align-items: flex-start; background: #f7f4fd; border-radius: 14px; padding: 16px; margin-bottom: 20px; }
.avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.avatar.customer { background: #ede8f9; }
.avatar.task { background: #e6f7f0; }
.bubble-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.label-customer { color: #5B2D8E; }
.label-task { color: #0f6e56; }
.bubble-text { font-size: 14px; line-height: 1.6; color: #2c2338; }
.section-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 14px; }
.badge-plaf { background: #e8f4fd; color: #185FA5; }
.badge-street { background: #e8f5e9; color: #2E7D32; }
.question-num { font-size: 11px; font-weight: 600; color: #b0a0c8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.question-text { font-size: 17px; font-weight: 700; line-height: 1.5; color: #2c2338; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { background: #f7f4fd; border: 2px solid #e2d9f3; border-radius: 12px; padding: 13px 16px; font-size: 14px; font-weight: 500; color: #3d2b5e; cursor: pointer; transition: all 0.15s; text-align: left; line-height: 1.4; width: 100%; }
.option:hover:not(.disabled) { border-color: #5B2D8E; background: #ede8f9; transform: translateX(4px); }
.option.correct { background: #e6f7f0; border-color: #1D9E75; color: #085041; }
.option.wrong { background: #fdeaea; border-color: #e05050; color: #7a1a1a; animation: shake 0.3s ease; }
.option.show-correct { background: #e6f7f0; border-color: #1D9E75; color: #085041; }
.option.disabled { cursor: default; }
@keyframes shake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)} }
.explanation { margin-top: 16px; padding: 13px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6; display: none; }
.explanation.show { display: block; }
.explanation.ok { background: #e6f7f0; color: #085041; border-left: 4px solid #1D9E75; }
.explanation.fail { background: #fdeaea; color: #7a1a1a; border-left: 4px solid #e05050; }
.nav-btn { max-width: 660px; margin: 0 auto; display: flex; justify-content: flex-end; }
.btn-next { background: #5B2D8E; color: #fff; border: none; border-radius: 12px; padding: 13px 32px; font-size: 14px; font-weight: 700; cursor: pointer; display: none; box-shadow: 0 4px 14px rgba(91,45,142,0.3); transition: all 0.15s; }
.btn-next:hover { background: #4a2275; transform: translateY(-1px); }
.btn-next.show { display: block; }
.result-screen { display: none; background: #fff; border-radius: 20px; padding: 40px 32px; max-width: 660px; margin: 0 auto; text-align: center; box-shadow: 0 4px 20px rgba(91,45,142,0.09); }
.result-screen.show { display: block; }
.result-emoji { font-size: 52px; margin-bottom: 16px; }
.result-score { font-size: 52px; font-weight: 800; margin-bottom: 8px; }
.score-good { color: #1D9E75; }
.score-mid { color: #BA7517; }
.score-bad { color: #e05050; }
.result-title { font-size: 20px; font-weight: 700; color: #2c2338; margin-bottom: 8px; }
.result-msg { font-size: 14px; color: #7a6d8a; line-height: 1.6; margin-bottom: 28px; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.res-card { border-radius: 14px; padding: 16px; text-align: center; }
.res-card.plaf-card { background: #e8f4fd; }
.res-card.street-card { background: #e8f5e9; }
.res-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.plaf-card .res-label { color: #185FA5; }
.street-card .res-label { color: #2E7D32; }
.res-score { font-size: 28px; font-weight: 800; }
.plaf-card .res-score { color: #185FA5; }
.street-card .res-score { color: #2E7D32; }
.btn-retry { background: #5B2D8E; color: #fff; border: none; border-radius: 12px; padding: 14px 40px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(91,45,142,0.3); transition: all 0.15s; }
.btn-retry:hover { background: #4a2275; transform: translateY(-1px); }
</style>
</head>
<body>

<header>
  <div class="logo">Svet.kz — Обучение стажёров</div>
  <h1>Плафоны и Уличные светильники</h1>
  <p>10 вопросов строго по материалу урока</p>
</header>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progress-label">Вопрос 1 из 10</span>
    <span id="progress-score">0 правильных</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div id="questions-wrap"></div>

<div class="nav-btn">
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Следующий →</button>
</div>

<div class="result-screen" id="result-screen">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-score" id="res-score"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-grid">
    <div class="res-card plaf-card">
      <div class="res-label">Плафоны</div>
      <div class="res-score" id="plaf-score"></div>
    </div>
    <div class="res-card street-card">
      <div class="res-label">Уличные</div>
      <div class="res-score" id="street-score"></div>
    </div>
  </div>
  <button class="btn-retry" onclick="restart()">Пройти ещё раз</button>
</div>

<script>
const questions = [

  // ===== ПЛАФОНЫ — 5 вопросов =====
  {
    section: 'plaf',
    scenario: null,
    text: 'Плафон — это...',
    options: [
      'Подвесной светильник на тросе или цепи',
      'Закрытый светильник, в котором не видно лампочек — полностью закрыт стеклом или другим материалом',
      'Настольный светильник с абажуром',
      'Светильник, который скользит по шине'
    ],
    correct: 1,
    explanation: 'Плафон — это закрытый светильник, который в основном устанавливается на потолках. В плафоне не видно лампочек — он полностью закрыт стеклом или другим материалом, и свет не бьёт в глаза.'
  },
  {
    section: 'plaf',
    scenario: { type: 'customer', text: 'У меня в ванной нет нормального освещения, что посоветуете?' },
    text: 'Что предложишь в первую очередь?',
    options: [
      'Люстру — она ярче всего',
      'Торшер рядом с ванной',
      'Плафон — подходит для влажных помещений, свет мягкий и рассеянный',
      'Подвес над ванной'
    ],
    correct: 2,
    explanation: 'Плафон — первое что стоит предложить для ванной. Он полностью закрыт, защищён от влаги, свет мягкий и рассеянный. Специально создан для влажных помещений.'
  },
  {
    section: 'plaf',
    scenario: { type: 'customer', text: 'У меня очень низкие потолки, боюсь что светильник будет мешать.' },
    text: 'Какой светильник посоветуешь?',
    options: [
      'Люстру на длинной цепи',
      'Подвес — он красиво смотрится',
      'Плафон — крепится вплотную к потолку и не съедает высоту',
      'Торшер — он стоит на полу'
    ],
    correct: 2,
    explanation: 'Плафон отлично смотрится в помещениях с низкими потолками — крепится вплотную к потолку и не "съедает" высоту. Именно то, что нужно покупателю.'
  },
  {
    section: 'plaf',
    scenario: null,
    text: 'Где можно использовать плафон? Выбери наиболее полный ответ.',
    options: [
      'Только в жилых комнатах',
      'Только в ванной',
      'В ванной, санузле, прихожей, на кухне, балконе, веранде и на улице',
      'Только в помещениях с высокими потолками'
    ],
    correct: 2,
    explanation: 'Плафоны универсальны: ванная, санузел, прихожая с низким потолком, кухня, балкон, лоджия, веранда и крыльцо. Можно даже на улице — защищены от внешней среды.'
  },
  {
    section: 'plaf',
    scenario: { type: 'task', text: 'Назови главное преимущество плафона по сравнению с открытыми светильниками' },
    text: 'Что верно?',
    options: [
      'Плафон ярче светит',
      'Плафон дешевле',
      'Лампочка скрыта — свет мягкий и рассеянный, глаза не устают',
      'Плафон можно переставлять с места на место'
    ],
    correct: 2,
    explanation: 'Главное преимущество плафона — лампочка полностью скрыта. Свет мягкий и рассеянный, не бьёт в глаза. Это особенно важно в ванной, прихожей и на кухне.'
  },

  // ===== УЛИЧНЫЕ — 5 вопросов =====
  {
    section: 'street',
    scenario: null,
    text: 'Чем уличные светильники отличаются от обычных?',
    options: [
      'Они дороже и крупнее',
      'Внутренности полностью изолированы — не страшны перепады температуры, дождь, снег и влага',
      'Они работают только от солнечных батарей',
      'У них нет лампочек — только светодиодная лента'
    ],
    correct: 1,
    explanation: 'Главное отличие уличных светильников: внутренности полностью изолированы. Не страшны перепады температуры, дождь, снег и влага. Внешне их узнают по металлу и элементам ковки.'
  },
  {
    section: 'street',
    scenario: { type: 'customer', text: 'Хочу что-то повесить у входной двери снаружи дома.' },
    text: 'Какой вид уличного светильника подойдёт?',
    options: [
      'Уличный фонарь на высокой опоре',
      'Уличный низкий садовый светильник',
      'Уличное бра — крепится на стену у входной двери',
      'Плафон на потолок крыльца'
    ],
    correct: 2,
    explanation: 'Уличное бра крепится на стену снаружи здания. Устанавливается у входной двери, на фасаде дома, у ворот. Создаёт уютное освещение входной зоны — именно то, что нужно.'
  },
  {
    section: 'street',
    scenario: { type: 'customer', text: 'У меня загородный дом, хочу подсветить садовые дорожки.' },
    text: 'Что предложишь?',
    options: [
      'Уличное бра на стену',
      'Уличный фонарь на высокой опоре',
      'Уличный низкий светильник (садовый) — устанавливается вдоль дорожек',
      'Споты на потолок веранды'
    ],
    correct: 2,
    explanation: 'Уличный низкий светильник (садовый) — невысокий светильник на ножке. Устанавливается вдоль дорожек, в саду или у крыльца. Освещает путь и создаёт атмосферу.'
  },
  {
    section: 'street',
    scenario: null,
    text: 'Какая минимальная степень защиты IP нужна для уличного светильника?',
    options: [
      'IP20',
      'IP33',
      'IP44 и выше',
      'IP — не важен для улицы'
    ],
    correct: 2,
    explanation: 'Для улицы подходят светильники с IP44 и выше. Чем выше цифра — тем лучше защита от влаги и пыли. IP44 означает защиту от брызг воды с любого направления.'
  },
  {
    section: 'street',
    scenario: { type: 'customer', text: 'Хочу красиво осветить большую территорию вдоль въезда в мой коттедж.' },
    text: 'Какой вид уличного светильника выбрать?',
    options: [
      'Уличное бра — повесить несколько на забор',
      'Уличный низкий садовый светильник',
      'Уличный фонарь на высокой опоре — обеспечивает общее освещение большой площади',
      'Плафоны на потолок гаража'
    ],
    correct: 2,
    explanation: 'Уличный фонарь — высокий светильник на опоре. Устанавливается на въезде, вдоль аллей, на территории частного дома или коттеджного посёлка. Обеспечивает общее освещение большой площади.'
  },
];

let current = 0, score = 0, plafScore = 0, streetScore = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

const shuffled = shuffle(questions);

function renderQuestion(idx) {
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';
  const q = shuffled[idx];
  const isPlaf = q.section === 'plaf';
  const card = document.createElement('div');
  card.className = 'card';

  let sc = '';
  if (q.scenario) {
    const isCust = q.scenario.type === 'customer';
    sc = `<div class="scenario"><div class="avatar ${isCust?'customer':'task'}">${isCust?'🧑':'📋'}</div><div><div class="bubble-label ${isCust?'label-customer':'label-task'}">${isCust?'Говорит покупатель':'Задание'}</div><div class="bubble-text">${q.scenario.text}</div></div></div>`;
  }

  card.innerHTML = `${sc}
    <div class="section-badge ${isPlaf?'badge-plaf':'badge-street'}">${isPlaf?'Плафоны':'Уличные светильники'}</div>
    <div class="question-num">Вопрос ${idx+1} из ${shuffled.length}</div>
    <div class="question-text">${q.text}</div>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>`;

  wrap.appendChild(card);

  const optWrap = document.getElementById('options');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, q.correct, q.explanation, q.section);
    optWrap.appendChild(btn);
  });

  answered = false;
  document.getElementById('btn-next').classList.remove('show');
  updateProgress();
}

function selectAnswer(chosen, correct, explanation, section) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add(chosen === correct ? 'correct' : 'show-correct');
    if (i === chosen && chosen !== correct) btn.classList.add('wrong');
  });
  const expEl = document.getElementById('explanation');
  expEl.textContent = explanation;
  expEl.classList.add('show');
  if (chosen === correct) {
    expEl.classList.add('ok'); score++;
    if (section === 'plaf') plafScore++; else streetScore++;
  } else { expEl.classList.add('fail'); }
  updateProgress();
  const btn = document.getElementById('btn-next');
  btn.textContent = current === shuffled.length-1 ? 'Посмотреть результат →' : 'Следующий →';
  btn.classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResult();
  else renderQuestion(current);
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = Math.round(current/shuffled.length*100)+'%';
  document.getElementById('progress-label').textContent = `Вопрос ${current+1} из ${shuffled.length}`;
  document.getElementById('progress-score').textContent = `${score} правильных`;
}

function showResult() {
  document.getElementById('questions-wrap').innerHTML = '';
  document.getElementById('btn-next').classList.remove('show');
  document.querySelector('.progress-wrap').style.display = 'none';
  document.getElementById('result-screen').classList.add('show');
  const pct = Math.round(score/shuffled.length*100);
  const scoreEl = document.getElementById('res-score');
  scoreEl.textContent = `${score} / ${shuffled.length}`;
  if (pct===100) {
    document.getElementById('res-emoji').textContent='🏆';
    scoreEl.className='result-score score-good';
    document.getElementById('res-title').textContent='Блестящий результат!';
    document.getElementById('res-msg').textContent='Все верно! Отлично знаешь тему плафонов и уличных светильников.';
  } else if (pct>=70) {
    document.getElementById('res-emoji').textContent='👍';
    scoreEl.className='result-score score-mid';
    document.getElementById('res-title').textContent='Хороший результат!';
    document.getElementById('res-msg').textContent='Большинство верно. Повтори моменты где ошибся и попробуй снова.';
  } else {
    document.getElementById('res-emoji').textContent='📚';
    scoreEl.className='result-score score-bad';
    document.getElementById('res-title').textContent='Нужно повторить материал';
    document.getElementById('res-msg').textContent='Рекомендуем ещё раз посмотреть видео и PDF по теме.';
  }
  const plafT = shuffled.filter(q=>q.section==='plaf').length;
  const streetT = shuffled.filter(q=>q.section==='street').length;
  document.getElementById('plaf-score').textContent = `${plafScore} / ${plafT}`;
  document.getElementById('street-score').textContent = `${streetScore} / ${streetT}`;
}

function restart() {
  current=0; score=0; plafScore=0; streetScore=0;
  document.getElementById('result-screen').classList.remove('show');
  document.querySelector('.progress-wrap').style.display='block';
  shuffled.sort(()=>Math.random()-0.5);
  renderQuestion(0);
}

renderQuestion(0);
</script>
</body>
</html>
