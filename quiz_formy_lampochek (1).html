<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Формы лампочек — Svet.kz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0ebfa;
  min-height: 100vh;
  padding: 32px 20px 60px;
  color: #1a1032;
}

header { text-align: center; margin-bottom: 32px; }
.logo { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #6B3FA0; margin-bottom: 8px; }
h1 { font-size: 24px; font-weight: 800; color: #1a1032; margin-bottom: 6px; }
header p { font-size: 14px; color: #7a6d8a; }

.instructions {
  background: #fff;
  border-radius: 16px;
  padding: 14px 20px;
  max-width: 700px;
  margin: 0 auto 20px;
  font-size: 13px;
  color: #5B2D8E;
  border-left: 4px solid #6B3FA0;
  line-height: 1.6;
}

.score-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  border-radius: 14px;
  padding: 14px 20px;
  max-width: 700px;
  margin: 0 auto 20px;
  box-shadow: 0 2px 12px rgba(107,63,160,0.08);
}

.score-num { font-size: 22px; font-weight: 800; color: #6B3FA0; }
.score-label { font-size: 12px; color: #9e8fb0; font-weight: 600; }

.match-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 700px;
  margin: 0 auto 24px;
}

.column-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #9e8fb0;
  margin-bottom: 10px;
  text-align: center;
}

.items-col { display: flex; flex-direction: column; gap: 10px; }

/* Названия слева */
.name-card {
  background: #fff;
  border: 2.5px solid #d4c8e8;
  border-radius: 14px;
  padding: 0 16px;
  font-size: 14px;
  font-weight: 700;
  color: #3d2b5e;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.3;
  gap: 4px;
}

.name-card .code {
  font-size: 18px;
  font-weight: 900;
  color: #6B3FA0;
}

.name-card .label {
  font-size: 12px;
  font-weight: 600;
  color: #7a6d8a;
}

.name-card .hint {
  font-size: 11px;
  color: #b0a0c8;
  font-weight: 400;
}

.name-card:hover:not(.used):not(.correct):not(.wrong) {
  border-color: #6B3FA0;
  background: #f0ebfa;
}

.name-card.selected {
  border-color: #6B3FA0;
  background: #6B3FA0;
  color: #fff;
  transform: scale(1.03);
}

.name-card.selected .code { color: #fff; }
.name-card.selected .label { color: rgba(255,255,255,0.8); }
.name-card.selected .hint { color: rgba(255,255,255,0.6); }

.name-card.correct { background: #e6f7f0; border-color: #1D9E75; }
.name-card.correct .code { color: #085041; }
.name-card.correct .label { color: #1D9E75; }
.name-card.wrong { background: #fdeaea; border-color: #e05050; animation: shake 0.3s; }
.name-card.wrong .code { color: #7a1a1a; }
.name-card.used { opacity: 0.35; cursor: default; }

/* Картинки справа */
.img-card {
  background: #fff;
  border: 2.5px solid #d4c8e8;
  border-radius: 14px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-card svg { width: 100%; height: 100%; }

.img-card:hover:not(.matched):not(.correct):not(.wrong) {
  border-color: #6B3FA0;
  background: #f0ebfa;
}

.img-card.correct { background: #e6f7f0; border-color: #1D9E75; }
.img-card.wrong { background: #fdeaea; border-color: #e05050; animation: shake 0.3s; }
.img-card.matched { opacity: 0.35; cursor: default; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

/* Результат */
.result-wrap {
  max-width: 700px;
  margin: 0 auto;
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(107,63,160,0.1);
  display: none;
}

.result-wrap.show { display: block; }
.result-emoji { font-size: 52px; margin-bottom: 14px; }
.result-score { font-size: 52px; font-weight: 800; margin-bottom: 8px; }
.result-score.good { color: #1D9E75; }
.result-score.mid  { color: #BA7517; }
.result-title { font-size: 20px; font-weight: 700; color: #1a1032; margin-bottom: 6px; }
.result-msg { font-size: 14px; color: #7a6d8a; line-height: 1.6; margin-bottom: 24px; }

.btn-retry {
  background: #6B3FA0;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px 40px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(107,63,160,0.3);
  transition: all 0.15s;
}

.btn-retry:hover { background: #5a3488; transform: translateY(-1px); }
</style>
</head>
<body>

<header>
  <div class="logo">Svet.kz — Обучение стажёров</div>
  <h1>Формы лампочек</h1>
  <p>Сопоставь название с формой</p>
</header>

<div class="instructions">
  👆 Нажми на <b>название</b> слева — оно подсветится. Затем нажми на <b>нужную форму</b> справа.
</div>

<div class="score-bar" id="score-bar">
  <div>
    <div class="score-num" id="score-num">0 / 5</div>
    <div class="score-label">правильных пар</div>
  </div>
  <div style="font-size:13px;color:#9e8fb0;">Формы лампочек</div>
</div>

<div class="match-area">
  <div>
    <div class="column-title">Название</div>
    <div class="items-col" id="names-col"></div>
  </div>
  <div>
    <div class="column-title">Форма</div>
    <div class="items-col" id="imgs-col"></div>
  </div>
</div>

<div class="result-wrap" id="result">
  <div class="result-emoji" id="r-emoji"></div>
  <div class="result-score" id="r-score"></div>
  <div class="result-title" id="r-title"></div>
  <div class="result-msg" id="r-msg"></div>
  <button class="btn-retry" onclick="init()">Попробовать снова</button>
</div>

<script>
const shapes = [
  {
    id: 'a60',
    code: 'A60',
    label: 'Груша',
    hint: 'Люстры, бра, торшеры',
    svg: `<svg viewBox="0 0 60 85" xmlns="http://www.w3.org/2000/svg">
      <!-- Груша: широкая круглая сверху, сужается книзу -->
      <path d="M30 6
               C46 6 48 18 48 28
               C48 40 42 50 36 52
               C34 53 32 54 30 54
               C28 54 26 53 24 52
               C18 50 12 40 12 28
               C12 18 14 6 30 6 Z"
            fill="#f5e6c8" stroke="#b07820" stroke-width="2"/>
      <!-- Юбка — сужение к цоколю -->
      <path d="M24 52 C22 54 21 56 22 58 L38 58 C39 56 38 54 36 52 Z"
            fill="#e0cc90" stroke="#b07820" stroke-width="1.5"/>
      <!-- Цоколь -->
      <rect x="22" y="58" width="16" height="16" rx="2" fill="#e0cc90" stroke="#b07820" stroke-width="1.5"/>
      <line x1="22" y1="62" x2="38" y2="62" stroke="#b07820" stroke-width="1.2"/>
      <line x1="22" y1="66" x2="38" y2="66" stroke="#b07820" stroke-width="1.2"/>
      <line x1="22" y1="70" x2="38" y2="70" stroke="#b07820" stroke-width="1.2"/>
    </svg>`
  },
  {
    id: 'c37',
    code: 'C37',
    label: 'Свеча',
    hint: 'Открытые люстры, бра',
    svg: `<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Свечевидная колба — заострённая вверху -->
      <path d="M30 6 C30 6 42 20 42 34 C42 46 37 52 30 54 C23 52 18 46 18 34 C18 20 30 6 30 6Z"
            fill="#f0d8f0" stroke="#8030a0" stroke-width="2"/>
      <!-- Юбка -->
      <path d="M22 54 Q22 58 24 60 L36 60 Q38 58 38 54 Z" fill="#d8b8e8" stroke="#8030a0" stroke-width="1.5"/>
      <!-- Цоколь -->
      <rect x="23" y="60" width="14" height="14" rx="2" fill="#d8b8e8" stroke="#8030a0" stroke-width="1.5"/>
      <line x1="23" y1="64" x2="37" y2="64" stroke="#8030a0" stroke-width="1.2"/>
      <line x1="23" y1="68" x2="37" y2="68" stroke="#8030a0" stroke-width="1.2"/>
    </svg>`
  },
  {
    id: 'cb',
    code: 'СВ',
    label: 'Свеча на ветру',
    hint: 'Хрустальные люстры, бра',
    svg: `<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Изогнутая свеча — верхушка скошена вправо -->
      <path d="M30 5 C33 5 40 16 40 28 C40 40 37 50 31 54 C25 52 20 44 20 33 C20 20 27 5 30 5Z"
            fill="#fcd8e8" stroke="#c0306c" stroke-width="2"/>
      <!-- Кончик загнутый вверх-вправо -->
      <path d="M34 5 C38 2 42 4 40 9" fill="none" stroke="#c0306c" stroke-width="2" stroke-linecap="round"/>
      <!-- Юбка -->
      <path d="M22 54 Q22 58 24 60 L36 60 Q38 58 38 54 Z" fill="#f0b8d0" stroke="#c0306c" stroke-width="1.5"/>
      <!-- Цоколь -->
      <rect x="23" y="60" width="14" height="14" rx="2" fill="#f0b8d0" stroke="#c0306c" stroke-width="1.5"/>
      <line x1="23" y1="64" x2="37" y2="64" stroke="#c0306c" stroke-width="1.2"/>
      <line x1="23" y1="68" x2="37" y2="68" stroke="#c0306c" stroke-width="1.2"/>
    </svg>`
  },
  {
    id: 'globe',
    code: 'Globe',
    label: 'Шар',
    hint: 'Открытые люстры, подвесы, декор',
    svg: `<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Круглая колба -->
      <circle cx="30" cy="28" r="21" fill="#d8f0e8" stroke="#1a7a50" stroke-width="2"/>
      <!-- Юбка -->
      <path d="M22 47 Q22 52 24 54 L36 54 Q38 52 38 47 Z" fill="#b8e0d0" stroke="#1a7a50" stroke-width="1.5"/>
      <!-- Цоколь -->
      <rect x="23" y="54" width="14" height="14" rx="2" fill="#b8e0d0" stroke="#1a7a50" stroke-width="1.5"/>
      <line x1="23" y1="58" x2="37" y2="58" stroke="#1a7a50" stroke-width="1.2"/>
      <line x1="23" y1="62" x2="37" y2="62" stroke="#1a7a50" stroke-width="1.2"/>
    </svg>`
  },
  {
    id: 'r',
    code: 'R',
    label: 'Рефлекторная',
    hint: 'Споты, точечное освещение',
    svg: `<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Рефлекторная: очень плоская верхушка, широкая -->
      <!-- Корпус — почти плоский диск сверху, чуть выпуклый -->
      <path d="M10 36 Q10 20 30 16 Q50 20 50 36 Z"
            fill="#d8e8f8" stroke="#1860a0" stroke-width="2"/>
      <!-- Плоское основание корпуса -->
      <rect x="10" y="34" width="40" height="7" rx="0" fill="#a8c8f0" stroke="#1860a0" stroke-width="1.5"/>
      <!-- Небольшое сужение / шейка -->
      <path d="M20 41 L18 50 L42 50 L40 41 Z" fill="#c0d8f0" stroke="#1860a0" stroke-width="1.5"/>
      <!-- Цоколь -->
      <rect x="21" y="50" width="18" height="16" rx="2" fill="#b8ccec" stroke="#1860a0" stroke-width="1.5"/>
      <line x1="21" y1="54" x2="39" y2="54" stroke="#1860a0" stroke-width="1.2"/>
      <line x1="21" y1="58" x2="39" y2="58" stroke="#1860a0" stroke-width="1.2"/>
      <line x1="21" y1="62" x2="39" y2="62" stroke="#1860a0" stroke-width="1.2"/>
      <!-- Блики внутри -->
      <line x1="18" y1="20" x2="16" y2="33" stroke="#a0c0e0" stroke-width="1" opacity="0.5"/>
      <line x1="30" y1="17" x2="30" y2="33" stroke="#a0c0e0" stroke-width="1" opacity="0.5"/>
      <line x1="42" y1="20" x2="44" y2="33" stroke="#a0c0e0" stroke-width="1" opacity="0.5"/>
    </svg>`
  },
];

let selected = null;
let matched = {};
let correct = 0;
const total = shapes.length;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function init() {
  selected = null;
  matched = {};
  correct = 0;
  document.getElementById('score-num').textContent = `0 / ${total}`;
  document.getElementById('result').classList.remove('show');
  document.getElementById('score-bar').style.display = '';
  document.querySelector('.match-area').style.display = '';
  document.querySelector('.instructions').style.display = '';

  const namesCol = document.getElementById('names-col');
  const imgsCol = document.getElementById('imgs-col');
  namesCol.innerHTML = '';
  imgsCol.innerHTML = '';

  const shuffledNames = shuffle(shapes);
  const shuffledImgs  = shuffle(shapes);

  shuffledNames.forEach(item => {
    const el = document.createElement('div');
    el.className = 'name-card';
    el.id = `name-${item.id}`;
    el.dataset.id = item.id;
    el.innerHTML = `<div class="code">${item.code}</div><div class="label">${item.label}</div><div class="hint">${item.hint}</div>`;
    el.onclick = () => selectName(item.id);
    namesCol.appendChild(el);
  });

  shuffledImgs.forEach(item => {
    const el = document.createElement('div');
    el.className = 'img-card';
    el.id = `img-${item.id}`;
    el.dataset.id = item.id;
    el.innerHTML = item.svg;
    el.onclick = () => selectImg(item.id);
    imgsCol.appendChild(el);
  });
}

function selectName(id) {
  if (matched[id]) return;
  document.querySelectorAll('.name-card').forEach(el => {
    if (!matched[el.dataset.id]) el.classList.remove('selected');
  });
  selected = id;
  document.getElementById(`name-${id}`).classList.add('selected');
}

function selectImg(imgId) {
  if (!selected) return;
  if (matched[imgId]) return;

  const nameEl = document.getElementById(`name-${selected}`);
  const imgEl  = document.getElementById(`img-${imgId}`);

  if (selected === imgId) {
    // ПРАВИЛЬНО
    nameEl.classList.remove('selected');
    nameEl.classList.add('correct', 'used');
    imgEl.classList.add('correct', 'matched');
    matched[selected] = true;
    matched[imgId]    = true;
    correct++;
    document.getElementById('score-num').textContent = `${correct} / ${total}`;
    selected = null;
    if (correct === total) setTimeout(showResult, 400);
  } else {
    // НЕПРАВИЛЬНО
    nameEl.classList.remove('selected');
    nameEl.classList.add('wrong');
    imgEl.classList.add('wrong');
    setTimeout(() => {
      nameEl.classList.remove('wrong');
      imgEl.classList.remove('wrong');
      selected = null;
    }, 600);
  }
}

function showResult() {
  window.parent.postMessage({ type: 'quiz_result', lesson_id: 28, score: correct, max_score: total, pct: Math.round(correct/total*100) }, '*');
  document.getElementById('result').classList.add('show');
  document.getElementById('score-bar').style.display = 'none';
  document.querySelector('.instructions').style.display = 'none';

  document.getElementById('r-emoji').textContent = '🏆';
  document.getElementById('r-score').textContent = `${correct} / ${total}`;
  document.getElementById('r-score').className = 'result-score good';
  document.getElementById('r-title').textContent = 'Все формы угаданы!';
  document.getElementById('r-msg').textContent = 'Отлично! Ты знаешь все формы лампочек — A60 Груша, C37 Свеча, СВ Свеча на ветру, Globe Шар и R Рефлекторная.';
}

init();
</script>
</body>
</html>
