<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз: Склады в 1С — SVET.KZ</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --g-deep:  #1a4a2e;
    --g-main:  #2d7a4a;
    --g-mid:   #3da360;
    --g-light: #6dc98a;
    --g-pale:  #e8f5ee;
    --g-border:#c3e6d0;
    --white:   #ffffff;
    --radius:  16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #f0f7f3;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 60px;
  }

  /* header */
  .top {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo { font-family:'Montserrat',sans-serif; font-weight:800; font-size:18px; color:var(--g-deep); letter-spacing:.5px; }
  .top h1 { font-family:'Montserrat',sans-serif; font-weight:800; font-size:clamp(20px,5vw,28px); color:var(--g-deep); margin-top:10px; }
  .top p  { font-size:13px; color:#5a7a65; margin-top:6px; }

  /* progress */
  .progress-wrap { width:100%; max-width:520px; margin-bottom:18px; }
  .progress-bar-bg { height:6px; background:#d1e8d9; border-radius:10px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--g-main),var(--g-light)); border-radius:10px; transition:width .4s ease; }
  .progress-label { font-size:12px; color:#6b8c76; margin-top:6px; text-align:right; }

  /* card */
  .card {
    background:var(--white);
    border:1px solid var(--g-border);
    border-radius:var(--radius);
    padding:28px 26px 24px;
    width:100%; max-width:520px;
    box-shadow:0 4px 20px rgba(26,74,46,.1);
  }

  .q-num {
    font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--g-mid); margin-bottom:10px;
  }
  .q-text {
    font-family:'Montserrat',sans-serif; font-weight:700;
    font-size:clamp(15px,3vw,18px); color:var(--g-deep);
    line-height:1.45; margin-bottom:22px;
  }

  /* options */
  .options { display:flex; flex-direction:column; gap:10px; }
  .opt {
    border:2px solid var(--g-border);
    border-radius:12px;
    padding:13px 16px;
    font-size:14px; font-weight:500;
    color:#2d4a38;
    cursor:pointer;
    transition:all .18s;
    background:var(--white);
    text-align:left;
  }
  .opt:hover:not(:disabled) { border-color:var(--g-main); background:var(--g-pale); }
  .opt.correct   { border-color:#16a34a; background:#dcfce7; color:#14532d; }
  .opt.wrong     { border-color:#dc2626; background:#fee2e2; color:#7f1d1d; }
  .opt.dimmed    { opacity:.45; }
  .opt:disabled  { cursor:default; }

  /* feedback */
  .feedback {
    margin-top:16px;
    padding:13px 16px;
    border-radius:12px;
    font-size:13px; line-height:1.6;
    display:none;
  }
  .feedback.show { display:block; }
  .feedback.ok  { background:#dcfce7; border:1px solid #86efac; color:#14532d; }
  .feedback.bad { background:#fee2e2; border:1px solid #fca5a5; color:#7f1d1d; }

  /* next btn */
  .btn-next {
    margin-top:18px; width:100%;
    padding:13px;
    background:var(--g-main);
    color:#fff;
    font-family:'Montserrat',sans-serif; font-weight:700;
    font-size:14px; letter-spacing:.3px;
    border:none; border-radius:12px;
    cursor:pointer;
    display:none;
    transition:background .2s;
  }
  .btn-next:hover { background:var(--g-deep); }
  .btn-next.show  { display:block; }

  /* result */
  .result {
    text-align:center;
    display:none;
  }
  .result.show { display:block; }
  .result-icon { font-size:56px; margin-bottom:12px; }
  .result h2   { font-family:'Montserrat',sans-serif; font-weight:800; font-size:24px; color:var(--g-deep); }
  .result-score { font-size:40px; font-weight:800; color:var(--g-main); margin:8px 0 4px; }
  .result-sub   { font-size:14px; color:#5a7a65; margin-bottom:20px; }
  .result-comment { font-size:13px; color:#3d5a47; line-height:1.65; margin-bottom:24px; padding:14px 16px; background:var(--g-pale); border-radius:12px; border:1px solid var(--g-border); }
  .btn-restart {
    padding:13px 32px;
    background:var(--g-main); color:#fff;
    font-family:'Montserrat',sans-serif; font-weight:700; font-size:14px;
    border:none; border-radius:12px; cursor:pointer;
    transition:background .2s;
  }
  .btn-restart:hover { background:var(--g-deep); }

  @media(max-width:400px){ .card{ padding:22px 18px 18px; } }
</style>
</head>
<body>

<div class="top">
  <div class="logo">💡 SVET.KZ</div>
  <h1>Тест: Склады в 1С</h1>
  <p>Сроки доставки и правила продажи — 7 вопросов</p>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 7</div>
</div>

<div class="card" id="quizCard">
  <div class="q-num" id="qNum"></div>
  <div class="q-text" id="qText"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="btn-next" id="btnNext" onclick="nextQ()">Следующий вопрос →</button>
</div>

<div class="card result" id="result">
  <div class="result-icon" id="resultIcon"></div>
  <h2>Результат</h2>
  <div class="result-score" id="resultScore"></div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-comment" id="resultComment"></div>
  <button class="btn-restart" onclick="restart()">Пройти ещё раз</button>
</div>

<script>
const questions = [
  {
    q: "Клиент хочет светильник с Import Москва. Сколько ждать доставку?",
    opts: ["1–3 дня", "До 5 дней", "2–3 недели", "Сразу, на складе есть"],
    correct: 2,
    explain: "Import Москва — склады поставщиков в Москве. Срок доставки 2–3 недели. Обязательно предупреди клиента!"
  },
  {
    q: "Товар лежит в «Контейнер №24 — под клиентов». Можешь продать его другому покупателю?",
    opts: ["Да, если клиент долго не забирает", "Нет, ни при каких условиях", "Да, с разрешения администратора", "Да, если это скидочная позиция"],
    correct: 1,
    explain: "Любой склад с пометкой «под клиентов» — неприкосновенен. Там лежат уже оплаченные или зарезервированные товары конкретных покупателей."
  },
  {
    q: "Клиент интересуется брендом EGLO. Товар есть на EGLO Kazakhstan. Когда привезём?",
    opts: ["1–3 дня", "До 5 дней", "1–2 недели", "2–3 недели"],
    correct: 0,
    explain: "EGLO Kazakhstan — это остатки EGLO в Алматы. Срок доставки всего 1–3 дня."
  },
  {
    q: "Клиент забрал свой заказ. Что нужно сделать в 1С прямо сейчас?",
    opts: ["Ничего, само обновится к вечеру", "Сделать перемещение на склад «РЕАЛИЗАЦИЯ»", "Удалить товар из резерва", "Позвонить Захиде"],
    correct: 1,
    explain: "Сразу после выдачи — перемещение на склад РЕАЛИЗАЦИЯ. Если забыть, в конце месяца вылезет недостача и будет штраф."
  },
  {
    q: "Бренд Майтони есть на складе «ДОВОЛЬНЫЙ КЛИЕНТ». Сколько дней ждать?",
    opts: ["1–3 дня", "До 5 дней", "1–2 недели", "2–3 недели"],
    correct: 1,
    explain: "«ДОВОЛЬНЫЙ КЛИЕНТ» — склады поставщиков Майтони и Фрея в Алматы. Срок доставки до 5 дней."
  },
  {
    q: "Клиент хочет купить светильник прямо с витрины в салоне Классик (Maytoni склад №801). Можно?",
    opts: ["Да, витрина — это просто выставка", "Нет, никогда", "Только если скидочная позиция или разрешение администратора", "Да, если клиент готов подождать пока привезут замену"],
    correct: 2,
    explain: "Витрину продавать нельзя — за исключением скидочных позиций или прямого разрешения администратора."
  },
  {
    q: "Менеджеру нужен поставщик с самым коротким сроком доставки в Алматы. Кто быстрее всех?",
    opts: ["Утеген батыра (1–3 дня)", "EGLO Kazakhstan (1–3 дня)", "Оба одинаково быстрые"],
    correct: 2,
    explain: "И Утеген батыра, и EGLO Kazakhstan дают срок 1–3 дня. Это самые быстрые варианты при заказе у поставщиков."
  }
];

let current = 0, score = 0, answered = false;

function render() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `Вопрос ${current + 1} из ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = o;
    btn.onclick = () => answer(i);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btnNext').className = 'btn-next';
  answered = false;
  updateProgress();
}

function answer(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.correct) b.classList.add('correct');
    else if (idx === i && i !== q.correct) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  const fb = document.getElementById('feedback');
  if (i === q.correct) {
    score++;
    fb.className = 'feedback ok show';
    fb.textContent = '✅ Правильно! ' + q.explain;
  } else {
    fb.className = 'feedback bad show';
    fb.textContent = '❌ Неверно. ' + q.explain;
  }
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = current < questions.length - 1 ? 'Следующий вопрос →' : 'Посмотреть результат →';
  btnNext.className = 'btn-next show';
}

function nextQ() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function updateProgress() {
  const pct = (current / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current} / ${questions.length}`;
}

function showResult() {
  const pct = Math.round(score / questions.length * 100);
  window.parent.postMessage({ type: 'quiz_result', lesson_id: 14, score: score, max_score: questions.length, pct: pct }, '*');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${questions.length} / ${questions.length}`;
  document.getElementById('quizCard').style.display = 'none';
  const r = document.getElementById('result');
  r.className = 'card result show';
  document.getElementById('resultScore').textContent = `${score} / ${questions.length}`;
  let icon, sub, comment;
  if (score === questions.length) {
    icon = '🏆'; sub = 'Отлично! Всё правильно';
    comment = 'Ты знаешь склады как свои пять пальцев. Клиенты будут получать точные сроки и менеджер не получит штраф за забытое перемещение.';
  } else if (score >= 5) {
    icon = '👍'; sub = 'Хороший результат!';
    comment = 'Основные правила знаешь. Повтори вопросы, в которых ошибся — особенно про склады «под клиентов» и обязательное перемещение на РЕАЛИЗАЦИЯ.';
  } else if (score >= 3) {
    icon = '📚'; sub = 'Есть над чем поработать';
    comment = 'Пересмотри справочник по складам — особенно сроки доставки и правила витрины. Пройди тест ещё раз, когда повторишь материал.';
  } else {
    icon = '🔄'; sub = 'Нужно повторить материал';
    comment = 'Вернись к справочнику «Склады в 1С» и прочитай внимательно каждый пункт — особенно красные (под клиентов) и оранжевые (витрины). Потом пройди тест снова.';
  }
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultComment').textContent = comment;
}

function restart() {
  current = 0; score = 0; answered = false;
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('result').className = 'card result';
  render();
}

render();
</script>
</body>
</html>
