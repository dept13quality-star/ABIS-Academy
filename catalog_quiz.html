<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз: страницы каталога</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
  .quiz-wrap { width: 100%; max-width: 860px; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; color: #333; font-weight: 500; }
  .progress-bar-bg { width: 100%; height: 8px; background: #d6f0d6; border-radius: 4px; margin-bottom: 16px; }
  .progress-bar-fill { height: 8px; background: #4caf50; border-radius: 4px; transition: width 0.4s; }

  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .img-wrap { background: #f0faf0; border-radius: 8px; display: flex; justify-content: center; align-items: center; padding: 20px; margin-bottom: 20px; min-height: 320px; }
  .img-wrap img { max-height: 320px; max-width: 100%; object-fit: contain; }

  .question { text-align: center; font-size: 16px; font-weight: 600; color: #222; margin-bottom: 20px; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .option-btn { border: 2px solid #a8d8a8; border-radius: 8px; background: #fff; padding: 16px; font-size: 15px; cursor: pointer; color: #333; transition: background 0.2s, border-color 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .option-btn:hover:not(:disabled) { background: #f0faf0; border-color: #4caf50; }
  .option-btn .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .option-btn .num { font-weight: 700; font-size: 17px; }
  .option-btn.correct { background: #e6f4e6; border-color: #4caf50; color: #2e7d32; }
  .option-btn.wrong { background: #fdecea; border-color: #e53935; color: #c62828; }

  .result { text-align: center; padding: 40px 20px; }
  .result h2 { font-size: 24px; margin-bottom: 12px; color: #2e7d32; }
  .result h2.fail { color: #c62828; }
  .result p { font-size: 16px; color: #555; margin-bottom: 24px; }
  .restart-btn { background: #4caf50; color: #fff; border: none; border-radius: 8px; padding: 12px 32px; font-size: 15px; cursor: pointer; font-weight: 600; }
  .restart-btn:hover { background: #388e3c; }
</style>
</head>
<body>
<div class="quiz-wrap">
  <div class="top-bar">
    <span id="q-counter">Вопрос 1 из 3</span>
    <span>✓ <span id="score">0</span></span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress" style="width:33%"></div></div>

  <div class="card" id="quiz-card">
    <div class="img-wrap"><img id="q-img" src="" alt="товар"></div>
    <div class="question">На какой странице каталога находится этот товар?</div>
    <div class="options" id="options"></div>
  </div>

  <div class="card result" id="result-card" style="display:none">
    <h2 id="result-title"></h2>
    <p id="result-text"></p>
    <button class="restart-btn" onclick="startQuiz()">Пройти заново</button>
  </div>
</div>

<script>
const questions = [
  {
    img: "https://dept13quality-star.github.io/ABIS-Academy/1-84.jpeg",
    options: [4, 134, 86, 184],
    correct: 86
  },
  {
    img: "https://dept13quality-star.github.io/ABIS-Academy/2-185.jpeg",
    options: [105, 185, 155, 285],
    correct: 185
  },
  {
    img: "https://dept13quality-star.github.io/ABIS-Academy/3-216.jpeg",
    options: [316, 136, 216, 116],
    correct: 216
  }
];

let current = 0, score = 0;

function startQuiz() {
  current = 0; score = 0;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('q-counter').textContent = `Вопрос ${current+1} из ${questions.length}`;
  document.getElementById('score').textContent = score;
  document.getElementById('progress').style.width = `${((current+1)/questions.length)*100}%`;
  document.getElementById('q-img').src = q.img;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="label">СТР.</span><span class="num">${val}</span>`;
    btn.onclick = () => answer(val, btn);
    opts.appendChild(btn);
  });
}

function answer(val, btn) {
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  if (val === q.correct) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = score;
    setTimeout(() => {
      current++;
      if (current < questions.length) {
        showQuestion();
      } else {
        showResult(true);
      }
    }, 900);
  } else {
    btn.classList.add('wrong');

    setTimeout(() => showResult(false), 900);
  }
}

function showResult(passed) {
  document.getElementById('quiz-card').style.display = 'none';
  const rc = document.getElementById('result-card');
  rc.style.display = 'block';
  const title = document.getElementById('result-title');
  if (passed) {
    title.className = '';
    title.textContent = 'Отлично, все верно! 🎉';
    document.getElementById('result-text').textContent = `Правильных ответов: ${score} из ${questions.length}`;
  } else {
    title.className = 'fail';
    title.textContent = 'Ошибка!';
    document.getElementById('result-text').textContent = `Правильных ответов: ${score} из ${questions.length}. Нужно знать все страницы — попробуй заново.`;
  }
}

startQuiz();
</script>
</body>
</html>
