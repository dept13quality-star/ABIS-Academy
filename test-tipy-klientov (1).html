<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Типы клиентов SVET.KZ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #4A2D8F;
  --purple-light: #7B5EA7;
  --gold: #D4A843;
  --gold-light: #F0C96A;
  --dark: #0F0B18;
  --surface: #1A1228;
  --surface2: #221830;
  --text: #F0EAF8;
  --muted: #9B87B5;
  --border: rgba(255,255,255,0.08);
  --correct: #3DB87A;
  --wrong: #E24B4A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Onest', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 20px 60px;
}

header {
  text-align: center;
  margin-bottom: 32px;
}

.logo {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}

h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 8px;
}

h1 span { color: var(--gold-light); }

header p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 480px;
  margin: 0 auto;
}

/* Progress */
.progress-wrap {
  max-width: 660px;
  margin: 0 auto 28px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
}

.progress-info span:last-child {
  font-weight: 600;
  color: var(--gold);
}

.progress-bar {
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple-light), var(--gold));
  border-radius: 100px;
  transition: width 0.4s ease;
}

/* Card */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  max-width: 660px;
  margin: 0 auto 20px;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Client scenario bubble */
.scenario-bubble {
  background: var(--surface2);
  border: 1px solid rgba(123,94,167,0.3);
  border-left: 3px solid var(--purple-light);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.bubble-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.bubble-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--purple-light);
  margin-bottom: 6px;
}

.bubble-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
}

/* Question */
.question-text {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.5;
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  font-family: 'Onest', sans-serif;
  font-size: 14px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: all 0.18s;
  line-height: 1.4;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--purple-light);
  background: rgba(123,94,167,0.15);
  transform: translateX(4px);
}

.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.18s;
}

.option-btn.correct {
  border-color: var(--correct);
  background: rgba(61,184,122,0.12);
  color: var(--correct);
}

.option-btn.correct .option-letter {
  background: var(--correct);
  color: #fff;
  border-color: var(--correct);
}

.option-btn.wrong {
  border-color: var(--wrong);
  background: rgba(226,75,74,0.1);
  color: #F09595;
  animation: shake 0.3s ease;
}

.option-btn.wrong .option-letter {
  background: var(--wrong);
  color: #fff;
  border-color: var(--wrong);
}

.option-btn.show-correct {
  border-color: var(--correct);
  background: rgba(61,184,122,0.08);
  color: var(--correct);
}

.option-btn:disabled { cursor: default; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Explanation */
.explanation {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.7;
  display: none;
}

.explanation.show { display: block; }
.explanation.ok { background: rgba(61,184,122,0.1); color: var(--correct); border-left: 3px solid var(--correct); }
.explanation.fail { background: rgba(226,75,74,0.08); color: #F09595; border-left: 3px solid var(--wrong); }

/* Next button */
.nav-wrap {
  max-width: 660px;
  margin: 0 auto;
  display: flex;
  justify-content: flex-end;
}

.btn-next {
  background: linear-gradient(135deg, var(--purple), #6B3FA0);
  border: none;
  border-radius: 12px;
  padding: 13px 32px;
  font-family: 'Onest', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  display: none;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(74,45,143,0.4);
}

.btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-next.show { display: block; }

/* Result */
.result-screen {
  display: none;
  background: var(--surface);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 20px;
  padding: 40px 32px;
  max-width: 660px;
  margin: 0 auto;
  text-align: center;
  animation: fadeUp 0.4s ease;
}

.result-screen.show { display: block; }

.result-emoji { font-size: 52px; margin-bottom: 14px; }

.result-score {
  font-family: 'Unbounded', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: var(--gold-light);
  margin-bottom: 6px;
}

.result-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
}

.result-msg {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 28px;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}

.btn-retry {
  background: linear-gradient(135deg, var(--purple), #6B3FA0);
  border: none;
  border-radius: 12px;
  padding: 14px 40px;
  font-family: 'Onest', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-retry:hover { opacity: 0.88; transform: translateY(-1px); }

/* Type badge */
.type-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
  background: rgba(212,168,67,0.15);
  color: var(--gold-light);
  border: 1px solid rgba(212,168,67,0.3);
}
</style>
</head>
<body>

<header>
  <div class="logo">✦ SVET.KZ · Обучение стажёров</div>
  <h1>Определи <span>тип клиента</span></h1>
  <p>Прочитай что говорит клиент и выбери его тип</p>
</header>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progress-label">Вопрос 1 из 10</span>
    <span id="progress-score">0 правильных</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div id="question-wrap"></div>

<div class="nav-wrap">
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Следующий →</button>
</div>

<div class="result-screen" id="result-screen">
  <div class="result-emoji" id="r-emoji"></div>
  <div class="result-score" id="r-score"></div>
  <div class="result-title" id="r-title"></div>
  <div class="result-msg" id="r-msg"></div>
  <button class="btn-retry" onclick="restart()">Пройти ещё раз</button>
</div>

<script>
const questions = [
  {
    scenario: '«У меня уже есть дизайн-проект, мне нужны светильники под конкретные артикулы и точные характеристики. Комиссионные обычно платите?»',
    avatar: '🎨',
    question: 'Кто этот клиент?',
    options: ['Рациональный', 'Дизайнер / Архитектор', 'Визуал', 'Эмоциональный'],
    correct: 1,
    explanation: 'Дизайнер работает по проекту, оперирует точными характеристиками и интересуется комиссионными. Это главные маркеры этого типа. С ним важна экспертность менеджера и наличие технического света на складах.'
  },
  {
    scenario: '«Покажите что-нибудь эксклюзивное — хочу чтобы у меня было не как у всех. Вот такой же есть у Бейонсе в клипе, можете найти похожее?»',
    avatar: '✨',
    question: 'Кто этот клиент?',
    options: ['Визуал', 'Рациональный', 'Эмоциональный', 'Семейная пара'],
    correct: 2,
    explanation: 'Эмоциональный клиент хочет быть уникальным, ориентируется на знаменитостей, принимает решение импульсивно. Ему нужны эмоции и оригинальность — не технические характеристики.'
  },
  {
    scenario: '«Скажите, сколько ватт? Какой индекс цветопередачи? Я уже смотрел в трёх магазинах, у вас дороже на 3000 тенге. Почему?»',
    avatar: '🔍',
    question: 'Кто этот клиент?',
    options: ['Аудиал', 'Дизайнер', 'Кинестетик', 'Рациональный'],
    correct: 3,
    explanation: 'Рациональный клиент сравнивает везде, оперирует цифрами, долго принимает решение. Ему нужно чётко объяснить выгоду: почему дороже — и что он получает за эту разницу.'
  },
  {
    scenario: '«Можно потрогать? А металл какой? Хочу чтобы люстра прослужила долго — мы с мужем один раз покупаем и надолго.»',
    avatar: '🤲',
    question: 'Кто этот клиент?',
    options: ['Кинестетик', 'Аудиал', 'Визуал', 'Рациональный'],
    correct: 0,
    explanation: 'Кинестетик обязательно хочет потрогать товар, важны тактильные ощущения и материалы. Ему важна безопасность и долговечность. Дайте потрогать металл, хрусталь — это лучше тысячи слов.'
  },
  {
    scenario: '«Просто покажите — я сразу вижу нравится или нет. Не надо долго объяснять. Вот это — красиво. Беру.»',
    avatar: '👁️',
    question: 'Кто этот клиент?',
    options: ['Эмоциональный', 'Визуал', 'Аудиал', 'Кинестетик'],
    correct: 1,
    explanation: 'Визуал принимает решение быстро и только глазами. Долгие консультации его раздражают. Ему важно наглядно показать товар — включённым, в красивой подаче. Используйте слова: посмотрите, взгляните, представьте.'
  },
  {
    scenario: '«Расскажите подробнее про гарантию. И ещё — какая у них репутация, этот бренд? Мне важно понимать что я покупаю надёжное.»',
    avatar: '👂',
    question: 'Кто этот клиент?',
    options: ['Рациональный', 'Кинестетик', 'Аудиал', 'Семейная пара'],
    correct: 2,
    explanation: 'Аудиал внимательно слушает, ему важна уверенная и чёткая речь менеджера. Расскажите про выгоду, акции, преимущества — он покупает ушами. Если в голосе менеджера будет нота сомнения — клиент уйдёт.'
  },
  {
    scenario: '«Нам нужна люстра в гостиную. Муж хочет чтобы было ярко и не дорого, а мне важно чтобы вписалась в интерьер — у нас современный стиль.»',
    avatar: '👨‍👩‍👧',
    question: 'Кто этот клиент?',
    options: ['Визуал', 'Дизайнер', 'Семейная пара', 'Эмоциональный'],
    correct: 2,
    explanation: 'Семейная пара — мужчина оценивает технические характеристики и цену, женщина — соответствие интерьеру и эмоции. Решение чаще принимает женщина, если светильник подошёл визуально и достаточно освещает.'
  },
  {
    scenario: '«Мне нравится вот эта. Стоп — а она точно не перегорит быстро? Покажите сертификат. И всё-таки, может есть что-то с похожим дизайном но дешевле?»',
    avatar: '🔍',
    question: 'Кто этот клиент?',
    options: ['Кинестетик', 'Аудиал', 'Эмоциональный', 'Рациональный'],
    correct: 3,
    explanation: 'Рациональный: сначала понравилось визуально, но сразу включился режим проверки — надёжность, документы, сравнение цен. Ему нужно рассеять сомнения фактами и экспертно объяснить разницу в цене.'
  },
  {
    scenario: '«Мне нужен тёплый мягкий свет — хочу создать уютную атмосферу дома, как в хорошем ресторане. Расскажите, какая температура света лучше для этого?»',
    avatar: '👂',
    question: 'Кто этот клиент?',
    options: ['Визуал', 'Аудиал', 'Кинестетик', 'Семейная пара'],
    correct: 1,
    explanation: 'Аудиал хочет создать атмосферу и настроение — это его мотив покупки. Он любит слушать и задаёт вопросы. Расскажите про температуру света, уютное освещение, выгоду — и говорите уверенно.'
  },
  {
    scenario: '«У меня объект — ресторан 400 м². Нужна спецификация на весь технический свет: треки, споты, профили. Есть прайс для юр. лиц?»',
    avatar: '🎨',
    question: 'Кто этот клиент?',
    options: ['Рациональный', 'Семейная пара', 'Дизайнер / Архитектор', 'Визуал'],
    correct: 2,
    explanation: 'Дизайнер или архитектор работает с объектами, говорит на профессиональном языке — спецификация, технический свет, юр. лицо. Ему важны: ассортимент, наличие на складе, гарантия и комиссионные.'
  },
];

let current = 0;
let score = 0;
let answered = false;
const letters = ['А', 'Б', 'В', 'Г'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Shuffle questions but keep original correct answer tracking
const shuffled = shuffle(questions.map(q => {
  const opts = q.options.map((o, i) => ({ text: o, isCorrect: i === q.correct }));
  const shuffledOpts = shuffle(opts);
  return { ...q, shuffledOptions: shuffledOpts };
}));

function render(idx) {
  const q = shuffled[idx];
  answered = false;

  const wrap = document.getElementById('question-wrap');
  wrap.innerHTML = `
    <div class="question-card">
      <div class="type-badge">Сценарий ${idx + 1} из ${shuffled.length}</div>
      <div class="scenario-bubble">
        <div class="bubble-avatar">${q.avatar}</div>
        <div>
          <div class="bubble-label">Говорит клиент</div>
          <div class="bubble-text">${q.scenario}</div>
        </div>
      </div>
      <div class="question-text">${q.question}</div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation"></div>
    </div>`;

  const opts = document.getElementById('options');
  q.shuffledOptions.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.text}`;
    btn.onclick = () => select(opt.isCorrect, btn, q.explanation);
    opts.appendChild(btn);
  });

  document.getElementById('btn-next').classList.remove('show');
  updateProgress();
}

function select(isCorrect, btn, explanation) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    // Find the correct button
    const bOpt = shuffled[current].shuffledOptions[Array.from(allBtns).indexOf(b)];
    if (bOpt.isCorrect && b !== btn) b.classList.add('show-correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    // Show correct answer
    allBtns.forEach(b => {
      const idx = Array.from(allBtns).indexOf(b);
      if (shuffled[current].shuffledOptions[idx].isCorrect) b.classList.add('show-correct');
    });
  }

  const exp = document.getElementById('explanation');
  exp.textContent = (isCorrect ? '✓ Верно! ' : '✗ Неверно. ') + explanation;
  exp.className = 'explanation show ' + (isCorrect ? 'ok' : 'fail');

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current === shuffled.length - 1 ? 'Посмотреть результат' : 'Следующий →';
  nextBtn.classList.add('show');
  updateProgress();
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResult();
  else render(current);
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = Math.round(current / shuffled.length * 100) + '%';
  document.getElementById('progress-label').textContent = `Вопрос ${current + 1} из ${shuffled.length}`;
  document.getElementById('progress-score').textContent = `${score} правильных`;
}

function showResult() {
  document.getElementById('question-wrap').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';

  const pct = Math.round(score / shuffled.length * 100);
  let emoji, title, msg;

  if (pct === 100) {
    emoji = '🏆'; title = 'Идеально!';
    msg = 'Ты отлично знаешь типы клиентов! Теперь ты сможешь быстро определить кто перед тобой и выбрать правильную стратегию разговора.';
  } else if (pct >= 70) {
    emoji = '🎉'; title = 'Отличный результат!';
    msg = 'Хорошее знание типов клиентов. Повтори сценарии где ошибся — и будешь готов к любому покупателю.';
  } else if (pct >= 50) {
    emoji = '💪'; title = 'Почти!';
    msg = 'Неплохо, но есть над чем поработать. Перечитай материал по типам клиентов и пройди тест ещё раз.';
  } else {
    emoji = '📚'; title = 'Нужно повторить материал';
    msg = 'Рекомендуем ещё раз изучить портреты клиентов ABIS и вернуться к тесту. Ты справишься!';
  }

  const screen = document.getElementById('result-screen');
  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-score').textContent = `${score} / ${shuffled.length}`;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-msg').textContent = msg;
  screen.classList.add('show');
}

function restart() {
  current = 0; score = 0; answered = false;
  document.getElementById('question-wrap').style.display = 'block';
  document.querySelector('.progress-wrap').style.display = 'block';
  document.getElementById('result-screen').classList.remove('show');
  shuffled.sort(() => Math.random() - 0.5);
  render(0);
}

render(0);
</script>
</body>
</html>
