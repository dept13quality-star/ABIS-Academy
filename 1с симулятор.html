<!-- СТИЛИ для блока симулятора (вставь в <head> страницы, один раз) -->
<style>
.sim-wrapper {
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid #2d6a4f;
  box-shadow: 0 8px 32px rgba(0,0,0,.25);
  background: #1a1f2e;
  margin: 20px 0;
  position: relative;
}
.sim-topbar {
  background: #0f1422;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #2a3456;
}
.sim-topbar-title {
  color: #c8d0e8;
  font-size: 13px;
  font-weight: 600;
}
.sim-topbar-badge {
  background: #e03a1e;
  color: #fff;
  font-weight: 800;
  font-size: 12px;
  padding: 2px 7px;
  border-radius: 3px;
}
.sim-fs-btn {
  margin-left: auto;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s;
}
.sim-fs-btn:hover { background: #2563eb; }
.sim-iframe {
  width: 100%;
  height: 680px;
  border: none;
  display: block;
}
@media (max-width: 768px) {
  .sim-iframe { height: 520px; }
}
</style>

<!-- БЛОК СИМУЛЯТОРА (вставь в нужное место урока) -->
<div class="sim-wrapper">
  <div class="sim-topbar">
    <span class="sim-topbar-badge">1С</span>
    <span class="sim-topbar-title">Интерактивный симулятор — Создание заказа для физ.лица</span>
    <button class="sim-fs-btn" onclick="openSimFullscreen()" title="Развернуть симулятор на весь экран">
      ⛶ Полный экран
    </button>
  </div>
  <iframe
    id="simIframe"
    class="sim-iframe"
    src="1c_simulator_fiz.html"
    allowfullscreen
    allow="fullscreen"
    title="Симулятор 1С"
  ></iframe>
</div>

<script>
function openSimFullscreen() {
  const iframe = document.getElementById('simIframe');
  // Метод 1: fullscreen самого iframe (работает в большинстве браузеров)
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  } else if (iframe.webkitRequestFullscreen) {
    iframe.webkitRequestFullscreen();
  } else if (iframe.mozRequestFullScreen) {
    iframe.mozRequestFullScreen();
  } else {
    // Метод 2: postMessage — симулятор сам разворачивается изнутри
    iframe.contentWindow.postMessage('requestFullscreen', '*');
  }
}
</script>

<!--
  ══════════════════════════════════════════════════════════════
  ВАЖНО: файл 1c_simulator_fiz.html должен лежать рядом
  с course-day1.html в том же каталоге репозитория.

  Структура файлов:
    ABIS-Academy/
    ├── index.html
    ├── course-day1.html       ← сюда вставляешь этот snippet
    └── 1c_simulator_fiz.html  ← симулятор (загрузи через GitHub)

  Атрибут allowfullscreen в <iframe> обязателен — без него
  браузер заблокирует переход в полный экран из iframe.
